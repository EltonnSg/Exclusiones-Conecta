<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Eventos por servicio</title>
<style>
  :root{
    --bg:#f4f1ea;
    --panel:#ffffff;
    --line:#e2ddd0;
    --ink:#1c1a16;
    --ink-soft:#6b6558;
    --accent:#0f6e56;
    --accent-soft:#e1f5ee;
    --si:#0f6e56;
    --no:#888780;
    --si-bg:#e1f5ee;
    --no-bg:#f1efe8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    padding:32px 20px 60px;
  }
  .wrap{max-width:1100px;margin:0 auto;}
  h1{
    font-size:22px;
    font-weight:600;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .sub{
    color:var(--ink-soft);
    font-size:14px;
    margin:0 0 28px;
  }
  .layout{
    display:flex;
    flex-direction:column;
    gap:20px;
  }
  .list-header{
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    margin-bottom:10px;
  }
  .items{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(84px,1fr));
    gap:8px;
  }
  .item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    padding:10px 6px;
    cursor:pointer;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    font-size:13px;
    text-align:center;
    transition:background .12s ease, border-color .12s ease;
  }
  .item:hover{background:#faf8f3;border-color:#d4cdba;}
  .item.active{background:var(--accent);border-color:var(--accent);}
  .item .label{font-weight:600;font-variant-numeric:tabular-nums;}
  .item.active .label{color:#ffffff;}
  .item .count{
    font-size:11px;
    color:var(--ink-soft);
    font-variant-numeric:tabular-nums;
  }
  .item.active .count{color:var(--accent-soft);}
  .detail{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px 24px;
    min-height:300px;
  }
  .detail-empty{
    display:flex;
    align-items:center;
    justify-content:center;
    height:300px;
    color:var(--ink-soft);
    font-size:14px;
  }
  .detail-head{
    display:flex;
    align-items:baseline;
    gap:12px;
    margin-bottom:4px;
  }
  .detail-head h2{
    font-size:20px;
    font-weight:600;
    margin:0;
  }
  .detail-head .orig{
    font-size:13px;
    color:var(--ink-soft);
    font-family:monospace;
  }
  .detail-count{
    color:var(--ink-soft);
    font-size:14px;
    margin:0 0 18px;
  }
  .detail-count b{color:var(--ink);}
  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  th{
    text-align:left;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    font-weight:600;
    padding:0 10px 8px;
    border-bottom:1px solid var(--line);
  }
  td{
    padding:9px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  tr:last-child td{border-bottom:none;}
  .pill{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:2px 8px;
    border-radius:20px;
  }
  .pill.si{background:var(--si-bg);color:var(--si);}
  .pill.no{background:var(--no-bg);color:var(--no);}
  .pill.periodo-noche-madrugada{background:#e6e5f4;color:#4a3aa7;}
  .pill.periodo-am{background:#faeeda;color:#854f0b;}
  .pill.periodo-md{background:#eaf3de;color:#3b6d11;}
  .pill.periodo-pt{background:#faece7;color:#993c1d;}
  .pill.periodo-noche{background:#e1e0e0;color:#2c2c2a;}
  .hora{font-variant-numeric:tabular-nums;font-weight:600;}
  .fecha{color:var(--ink-soft);font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Eventos por servicio</h1>
  <p class="sub">Selecciona un servicio para ver cuántas veces aparece y en qué horarios.</p>

  <div class="layout">
    <div>
      <div class="list-header">Servicios</div>
      <div class="items" id="items"></div>
    </div>
    <div class="detail" id="detail">
      <div class="detail-empty">Elige un servicio del cuadro</div>
    </div>
  </div>
</div>

  { label: 'Noche',           from: 1200, to: 1440 }

function segmentoDe(modMinutos){
  return PERIODOS.find(p => modMinutos >= p.from && modMinutos < p.to) || PERIODOS[PERIODOS.length - 1];
}

function periodosDelEvento(inicioStr, terminoStr){
  const inicio = new Date(inicioStr.replace(' ', 'T'));
  const termino = new Date(terminoStr.replace(' ', 'T'));
  const inicioMinDia = inicio.getHours() * 60 + inicio.getMinutes();
  let duracionMin = Math.round((termino - inicio) / 60000);
  if (duracionMin <= 0) duracionMin = 1;

  const orden = [];
  const minutosPorPeriodo = {};
  let cursor = inicioMinDia;
  const fin = inicioMinDia + duracionMin;
  let guard = 0;
  while (cursor < fin && guard < 10) {
    const mod = ((cursor % 1440) + 1440) % 1440;
    const seg = segmentoDe(mod);
    const avance = Math.min(seg.to - mod, fin - cursor);
    if (!(seg.label in minutosPorPeriodo)) {
      minutosPorPeriodo[seg.label] = 0;
      orden.push(seg.label);
    }
    minutosPorPeriodo[seg.label] += avance;
    cursor += avance > 0 ? avance : 1440;
    guard++;
  }
  return orden.map(label => ({ label, minutos: minutosPorPeriodo[label] }));
}

function formatoMin(mins){
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return m > 0 ? `${h}h ${m}min` : `${h}h`;
}

function periodoClass(periodo){
  return periodo.replace(/\s+/g, '-').toLowerCase();
}

function renderList(){
  itemsEl.innerHTML = '';
  DATA.forEach((s, idx) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.dataset.idx = idx;
    div.innerHTML = `<span class="label">${s.label}</span><span class="count">${s.count} ${s.count === 1 ? 'vez' : 'veces'}</span>`;
    div.addEventListener('click', () => selectService(idx));
    itemsEl.appendChild(div);
  });
}

function selectService(idx){
  document.querySelectorAll('.item').forEach(el => el.classList.remove('active'));
  document.querySelector(`.item[data-idx="${idx}"]`).classList.add('active');

  const s = DATA[idx];
  const rows = s.events.map(e => {
    const [fecha, hora] = e.inicio.split(' ');
    const horaTermino = e.termino.split(' ')[1];
    const pillClass = e.triada === 'Si' ? 'si' : 'no';
    const horas = Math.floor(e.duracion);
    const minutos = Math.round((e.duracion - horas) * 60);
    const excluido = minutos > 0 ? `${horas}h ${minutos}min` : `${horas}h`;
    const periodos = periodosDelEvento(e.inicio, e.termino);
    const periodoHtml = periodos
      .map(p => `<span class="pill periodo-${periodoClass(p.label)}">${p.label} · ${formatoMin(p.minutos)}</span>`)
      .join(' - ');
    return `<tr>
      <td class="fecha">${fecha}</td>
      <td class="hora">${hora}</td>
      <td class="hora">${horaTermino}</td>
      <td class="hora">${excluido}</td>
      <td>${e.motivo}</td>
      <td><span class="pill ${pillClass}">Triada ${e.triada}</span></td>
      <td>${periodoHtml}</td>
    </tr>`;
  }).join('');

  detailEl.innerHTML = `
    <div class="detail-head">
      <h2>${s.label}</h2>
      <span class="orig">${s.original}</span>
    </div>
    <p class="detail-count">Aparece <b>${s.count}</b> ${s.count === 1 ? 'vez' : 'veces'} en el registro</p>
    <table>
      <thead><tr><th>Fecha</th><th>Hora inicio</th><th>Hora término</th><th>Tiempo excluido</th><th>Motivo</th><th>Triada</th><th>Periodo de exclusión</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

renderList();
</script>
</body>
</html>
